<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Texto de la minuta</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#eef5ff;
    margin:0;
    padding:20px;
}

.container{
    max-width:600px;
    margin:auto;
}

h2{
    text-align:center;
    color:#2b5dab;
}

textarea{
    width:100%;
    height:60vh;
    padding:15px;
    font-size:16px;
    border-radius:8px;
    border:1px solid #ccc;
    resize:none;
    box-sizing:border-box;
}

button{
    margin-top:15px;
    width:100%;
    padding:14px;
    font-size:18px;
    border:none;
    border-radius:8px;
    background:#3b82f6;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#2563eb;
}

</style>

</head>

<body>

<div class="container">

<h2>Minuta para copiar</h2>

<textarea id="texto">{{texto}}</textarea>

<button onclick="copiar()">Copiar texto</button>

</div>

<script>

function copiar(){

    let textarea = document.getElementById("texto");

    // intento moderno
    if (navigator.clipboard) {

        navigator.clipboard.writeText(textarea.value)
        .then(() => alert("Texto copiado"))
        .catch(() => copiarAntiguo());

    } else {

        copiarAntiguo();

    }

}

function copiarAntiguo(){

    let textarea = document.getElementById("texto");

    textarea.select();
    textarea.setSelectionRange(0, 99999);

    document.execCommand("copy");

    alert("Texto copiado");

}

</script>

</body>
</html>
